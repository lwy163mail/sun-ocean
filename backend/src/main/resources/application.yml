server:
  port: 8080

spring:
  application:
    name: sun-ocean-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/sun_ocean?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    com.sunocean: DEBUG
    org.springframework.web: INFO